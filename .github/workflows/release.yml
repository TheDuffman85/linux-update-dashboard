name: Release

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: 24.18.0

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: ghcr-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          PREFIX="${YEAR}.${MONTH}."

          git fetch --tags
          PREVIOUS_TAG=$(git tag -l "[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -1)
          LATEST_N=$(git tag -l "${PREFIX}*" --sort=-v:refname | head -1 | sed "s/^${PREFIX}//")

          if [ -z "$LATEST_N" ]; then
            NEXT_N=1
          else
            NEXT_N=$((LATEST_N + 1))
          fi

          VERSION="${YEAR}.${MONTH}.${NEXT_N}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "Calculated version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_BUILD_DATE=${{ steps.version.outputs.date }}
            APP_COMMIT_HASH=${{ steps.version.outputs.sha8 }}
            APP_BRANCH=main
            APP_REPOSITORY=${{ github.repository }}
            APP_REPO_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Build release notes
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const fs = require("fs");
            const { execFileSync } = require("child_process");

            const version = process.env.VERSION;
            const previousTag = process.env.PREVIOUS_TAG;
            const repository = process.env.REPOSITORY;
            const [owner, repo] = repository.split("/");

            const git = (args) =>
              execFileSync("git", args, { encoding: "utf8" }).trim();
            const prUrl = (number) =>
              `https://github.com/${repository}/pull/${number}`;
            const commitUrl = (sha) =>
              `https://github.com/${repository}/commit/${sha}`;
            const contributors = new Map();
            const addContributor = (user) => {
              if (!user?.login || user.type === "Bot") return;
              contributors.set(
                user.login,
                user.html_url || `https://github.com/${user.login}`
              );
            };
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const withRetries = async (label, fn, retries = 3) => {
              for (let attempt = 1; attempt <= retries; attempt += 1) {
                try {
                  return await fn();
                } catch (error) {
                  const message = error?.message || String(error);

                  if (attempt === retries) {
                    core.warning(
                      `${label} failed after ${attempt} attempts: ${message}`
                    );
                    throw error;
                  }

                  const delay = attempt * 1000;
                  core.warning(
                    `${label} failed on attempt ${attempt}/${retries}: ${message}. Retrying in ${delay}ms.`
                  );
                  await sleep(delay);
                }
              }
            };

            const range = previousTag ? `${previousTag}..HEAD` : "HEAD";
            const log = git(["log", "--reverse", "--format=%H%x1f%s", range]);
            const commits = log
              ? log.split("\n").map((line) => {
                  const [sha, subject] = line.split("\x1f");
                  return { sha, subject };
                })
              : [];

            const prNumbers = [];
            const seenPullRequests = new Set();
            const fallbackCommitsByPullRequest = new Map();
            const directCommits = [];

            for (const commit of commits) {
              let pulls = [];

              try {
                const response = await withRetries(
                  `Fetching pull requests for ${commit.sha}`,
                  () => github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner,
                    repo,
                    commit_sha: commit.sha,
                  })
                );
                pulls = response.data;
              } catch {
                directCommits.push(commit);
                continue;
              }

              const pullRequest = pulls.find((pull) => pull.merged_at) || pulls[0];

              if (!pullRequest) {
                directCommits.push(commit);
                continue;
              }

              const fallbackCommits =
                fallbackCommitsByPullRequest.get(pullRequest.number) || [];
              fallbackCommits.push(commit);
              fallbackCommitsByPullRequest.set(
                pullRequest.number,
                fallbackCommits
              );

              if (!seenPullRequests.has(pullRequest.number)) {
                prNumbers.push(pullRequest.number);
                seenPullRequests.add(pullRequest.number);
                addContributor(pullRequest.user);
              }
            }

            const lines = ["## Changes", ""];

            if (prNumbers.length === 0 && directCommits.length === 0) {
              lines.push("- No code changes detected for this release.", "");
            }

            for (const number of prNumbers) {
              let prCommits = [];

              try {
                prCommits = await withRetries(
                  `Fetching commits for pull request #${number}`,
                  () => github.paginate(github.rest.pulls.listCommits, {
                    owner,
                    repo,
                    pull_number: number,
                    per_page: 100,
                  })
                );
              } catch {
                for (const commit of fallbackCommitsByPullRequest.get(number) || []) {
                  lines.push(`- ${commit.subject} ([#${number}](${prUrl(number)}))`);
                }
                continue;
              }

              for (const commit of prCommits) {
                addContributor(commit.author);
                const subject = commit.commit.message.split("\n")[0];
                lines.push(`- ${subject} ([#${number}](${prUrl(number)}))`);
              }
            }

            if (directCommits.length > 0) {
              for (const commit of directCommits) {
                lines.push(
                  `- ${commit.subject} ([${commit.sha.slice(0, 7)}](${commitUrl(commit.sha)}))`
                );
                try {
                  const { data: directCommit } = await withRetries(
                    `Fetching commit ${commit.sha}`,
                    () => github.rest.repos.getCommit({
                      owner,
                      repo,
                      ref: commit.sha,
                    })
                  );
                  addContributor(directCommit.author);
                } catch {
                  core.warning(`Skipping contributor lookup for ${commit.sha}.`);
                }
              }
            }

            lines.push("");

            if (contributors.size > 0) {
              lines.push("## Contributors", "");

              for (const [login, url] of [...contributors].sort()) {
                lines.push(`- [@${login}](${url})`);
              }

              lines.push("");
            }

            if (previousTag) {
              lines.push(
                `[Full changelog](https://github.com/${repository}/compare/${previousTag}...${version})`,
                ""
              );
            }

            lines.push(
              "## Docker",
              "",
              "```bash",
              `docker pull ghcr.io/${repository}:${version}`,
              "```",
              ""
            );

            fs.writeFileSync("release-notes.md", lines.join("\n"));

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: release-notes.md

      - name: Delete untagged images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ github.event.repository.name }}
          delete-untagged: true
